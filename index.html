<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الشجرة قيد الصيانة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink: #1b241d;
    --parchment: #eee7d6;
    --parchment-dim: #d9cfb4;
    --gold: #a9863f;
    --gold-soft: #c9ab6c;
    --line: rgba(169,134,63,0.35);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    height:100%;
  }

  body{
    background:
      radial-gradient(ellipse at 50% -10%, #24312a 0%, var(--ink) 55%, #10160f 100%);
    color: var(--parchment);
    font-family: 'Tajawal', sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    position:relative;
  }

  /* نسيج ورقي خفيف */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(rgba(255,255,255,0.02) 1px, transparent 1px);
    background-size: 3px 3px;
    pointer-events:none;
    z-index:1;
  }

  .frame{
    position:relative;
    z-index:2;
    width:min(640px, 88vw);
    text-align:center;
    padding: 56px 40px;
    border: 1px solid var(--line);
    border-radius: 2px;
  }

  .frame::before, .frame::after{
    content:"";
    position:absolute;
    width:22px; height:22px;
    border: 1px solid var(--gold-soft);
    opacity:0.7;
  }
  .frame::before{ top:-1px; right:-1px; border-left:none; border-bottom:none; }
  .frame::after{ bottom:-1px; left:-1px; border-right:none; border-top:none; }

  .branch-wrap{
    width: 220px;
    margin: 0 auto 34px;
  }

  .branch-wrap svg{
    width:100%;
    height:auto;
    overflow: visible;
  }

  .branch-line{
    fill:none;
    stroke: var(--gold-soft);
    stroke-width: 1.4;
    stroke-linecap: round;
    stroke-dasharray: 260;
    stroke-dashoffset: 260;
    animation: draw 2.6s ease-out forwards;
  }

  .leaf{
    fill: var(--parchment-dim);
    fill-opacity: 0;
    transform-origin: center;
    transform-box: fill-box;
    animation: bud 1.2s ease-out forwards;
  }
  .leaf.l1{ animation-delay: 1.1s; }
  .leaf.l2{ animation-delay: 1.4s; }
  .leaf.l3{ animation-delay: 1.7s; }
  .leaf.l4{ animation-delay: 2.0s; }
  .leaf.l5{ animation-delay: 2.3s; }

  @keyframes draw{
    to{ stroke-dashoffset: 0; }
  }
  @keyframes bud{
    from{ fill-opacity:0; transform: scale(0.4); }
    to{ fill-opacity:1; transform: scale(1); }
  }

  .eyebrow{
    font-family:'Tajawal', sans-serif;
    font-weight:300;
    letter-spacing: 3px;
    font-size: 0.72rem;
    color: var(--gold-soft);
    text-transform: uppercase;
    margin-bottom: 18px;
    opacity: 0;
    animation: fade 1s ease-out 2.6s forwards;
  }

  h1{
    font-family:'Amiri', serif;
    font-weight:700;
    font-size: 2.5rem;
    line-height:1.3;
    color: var(--parchment);
    margin-bottom: 16px;
    opacity:0;
    animation: fade 1.1s ease-out 2.8s forwards;
  }

  p.desc{
    font-weight: 300;
    font-size: 1rem;
    line-height:1.9;
    color: var(--parchment-dim);
    max-width: 420px;
    margin: 0 auto;
    opacity:0;
    animation: fade 1.1s ease-out 3.1s forwards;
  }

  .divider{
    width: 60px;
    height:1px;
    background: var(--gold-soft);
    margin: 26px auto;
    opacity:0;
    animation: fade 1s ease-out 3s forwards;
  }

  @keyframes fade{
    from{ opacity:0; transform: translateY(8px); }
    to{ opacity:1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce){
    .branch-line, .leaf, .eyebrow, h1, p.desc, .divider{
      animation: none !important;
      opacity:1 !important;
      stroke-dashoffset: 0 !important;
      fill-opacity:1 !important;
    }
  }

  .actions{
    display:flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 34px;
    opacity:0;
    animation: fade 1.1s ease-out 3.4s forwards;
  }

  .btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    text-decoration:none;
    font-family:'Tajawal', sans-serif;
    font-size: 0.95rem;
    padding: 13px 20px;
    border-radius: 2px;
    transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease;
    letter-spacing: 0.3px;
  }

  .btn svg{ width:16px; height:16px; flex-shrink:0; }

  .btn-primary{
    background: var(--gold);
    color: var(--ink);
    font-weight: 500;
    border: 1px solid var(--gold);
  }
  .btn-primary:hover{
    background: var(--gold-soft);
    transform: translateY(-2px);
  }

  .btn-secondary{
    background: transparent;
    color: var(--parchment-dim);
    border: 1px solid var(--line);
    font-weight: 300;
  }
  .btn-secondary:hover{
    border-color: var(--gold-soft);
    color: var(--parchment);
    transform: translateY(-2px);
  }

  @media (max-width: 480px){
    h1{ font-size: 1.9rem; }
    .frame{ padding: 42px 24px; }
  }
</style>
</head>
